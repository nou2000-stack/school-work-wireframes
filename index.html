<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--lime:#E8FF8F;--limeA:#C3F25A;--limeDark:#3D7A00;--amber:#f59e0b;--fw:260px;--fh:564px}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#EDEDED;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}

.screen-grid{display:flex;flex-wrap:wrap;gap:20px;padding:0 24px 32px}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.phone-wrap:hover .phone{box-shadow:0 16px 48px rgba(0,0,0,.2);transform:translateY(-2px)}
.phone{width:var(--fw);height:var(--fh);background:#e8e8e8;border-radius:36px;border:2px solid #ccc;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.1);transition:all .2s}
.phone-notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:76px;height:10px;background:#1a1a1a;border-radius:5px;z-index:20}
.phone-screen{position:absolute;inset:0;background:#fff;border-radius:34px;overflow:hidden}
.screen-num{font-size:11px;font-weight:800;color:#1a1a1a;text-align:center}
.screen-name{font-size:9px;font-weight:600;letter-spacing:.05em;color:#737373;text-align:center;text-transform:uppercase}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:20px}
.detail-overlay.open{display:flex}
.detail-panel{background:#fff;border-radius:20px;display:flex;max-height:92vh;overflow:hidden;width:min(860px,98vw);box-shadow:0 32px 100px rgba(0,0,0,.4);position:relative}
.detail-phone-col{background:#f2f2f2;padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0}
.detail-anno-col{flex:1;overflow-y:auto;padding:24px 26px;min-width:0}

.close-btn:hover{background:#e5e5e5}
.anno-title{font-size:17px;font-weight:800;color:#1a1a1a;letter-spacing:-.03em;margin-bottom:16px;line-height:1.2;padding-right:30px}

.st{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 4px;flex-shrink:0}

.sp{padding:0 14px}
.cd{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:12px 14px}
.ca{border-left:3px solid #C3F25A}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}

.bk{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}

.mpf{height:100%;background:#C3F25A;border-radius:3px}
.lh{background:#E8FF8F;padding:0 5px;border-radius:4px}
.ck{width:16px;height:16px;border:1.5px solid #1a1a1a;border-radius:4px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}

h:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="flex:1;padding:14px 14px 12px;display:flex;flex-direction:column;gap:10px"><div><div style="font-size:17px;font-weight:800;color:#1a1a1a;line-height:1.2;letter-spacing:-.04em;margin-bottom:3px">Let's create a skincare<br>journey tailored to you!</div><div style="font-size:11px;color:#737373">How detailed would you like to go?</div></div><div style="display:flex;flex-direction:column;gap:8px;flex:1"><div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><div style="font-size:12px;font-weight:700;color:#1a1a1a">Quick Start</div><div style="font-size:9px;color:#737373;background:#f5f5f5;padding:2px 7px;border-radius:10px">Low effort</div></div><div style="font-size:10px;color:#737373">Basic recommendations &middot; 2 minutes</div></div><div class="cd" style="border:1.5px solid #1a1a1a;position:relative"><div style="position:absolute;top:-8px;left:12px;background:#1a1a1a;color:#fff;font-size:8px;font-weight:700;padding:2px 8px;border-radius:10px;letter-spacing:.04em">Recommended</div><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;margin-top:4px"><div style="font-size:12px;font-weight:700;color:#1a1a1a">Balanced Care</div><div style="background:#fef3c7;color:#92400e;font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px">Medium effort</div></div><div style="font-size:10px;color:#737373">Personalized suggestions &middot; 6 minutes</div></div><div class="cd"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:3px"><div style="font-size:12px;font-weight:700;color:#1a1a1a">Luxury Radiance</div><div style="font-size:9px;color:#fff;background:#f59e0b;padding:2px 7px;border-radius:10px;font-weight:600">High effort</div></div><div style="font-size:10px;color:#737373">Highly tailored experience &middot; 11 minutes</div></div></div><button class="blk" sty {n:4,lb:"Scan prep",sec:"o",
h:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="flex:1;padding:16px 18px 14px;display:flex;flex-direction:column;justify-content:space-between"><div><div style="display:flex;justify-content:center;margin-bottom:16px"><div style="width:68px;height:56px;border:1.5px dashed #c8c8c8;border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative"><div style="width:18px;height:18px;border:1.5px dashed #c8c8c8;border-radius:50%"></div><div style="position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:12px;height:7px;border:1.5px dashed #c8c8c8;border-radius:4px 4px 0 0"></div></div></div><div style="font-size:18px;font-weight:800;color:#1a1a1a;letter-spacing:-.04em;margin-bottom:4px">Lights, Camera, Selfie!</div><div style="font-size:11px;color:#737373;line-height:1.5;margin-bottom:14px">To tailor your skincare routine perfectly, I'll need a clear photo:</div><div style="display:flex;flex-direction:column;gap:9px"><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Remove glasses and sunglasses.</span></div><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Face the camera directly, neutral expression.</span></div><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Find good, even lighting - no harsh shadows.</span></div><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Avoid makeup for most accurate assessment.</span></div></div></div><div><div style="font-size:10px;color:#b0b0b0;text-align:center;margin-bottom:12px;line-height:1.4">Don't worry it's private - I'll only use it to understand your skin better.</div><button class="blk">Take Selfie</button></div></div></div>`,

{n:5,lb:"Camera capture",sec:"o",

>`,

{n:6,lb:"AI processing",sec:"o",
h:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px"><svg width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="18" fill="none" stroke="#e5e5e5" stroke-width="3"/><circle cx="22" cy="22" r="18" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-dasharray="75 38" stroke-linecap="round" transform="rotate(-90 22 22)"/></svg><div style="font-size:22px;font-weight:800;letter-spacing:-.04em;color:#1a1a1a">MIRAI</div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:10px 14px;max-width:200px"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">Analyzing your skin now... This won't take long.</div></div><div style="display:flex;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:#d0d0d0"></div><div style="width:6px;height:6px;border-radius:50%;background:#d0d0d0"></div><div style="width:6px;height:6px;border-radius:50%;background:#1a1a1a"></div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:10px 14px;max-width:210px"><div style="font-size:11px;color:#737373;line-height:1.5">While I work on it - did you know exercise increases blood flow, bringing oxygen and nutrients to the skin?</div></div></div></div>`,
comp:[{t:"ui",n:"Loading/Spinner",d:"44px SVG stroke spinner. Gray track, black arc."},{t:"ui",n:"Text/Brand-Mark",d:"'MIRAI' - 22px / 800wt. Only full wordmark in mid-flow."},{t:"ui",n:"Chat-Bubble/Processing",d:"Gray bg (#f5f5f5), radius 12px 12px 12px 4px. Appears at 800ms."},{t:"ui",n:"Pagination/Step-Dots",d:"3 dots. Third fills dark = pipeline step."},{t:"ui",n:"Chat-Bubble/Skin-Fact",d:"Second bubble, muted text. Appears at ~2.2s."}],
ux:[{n:"01",t:"Conversational loading - bubbles reframe waiting as 'MIRAI is working for me'."},{n:"02",t:"Skin fact is first value delivery before results arrive. Establishes MIRAI as knowledgeable companion."}],
flags:[]},

{n:7,lb:"Vera chat (rep.)",sec:"o",
h:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="display:flex;align-items:center;gap:8px;padding:4px 14px 8px;border-bottom:1px solid #f0f0f0;flex-shrink:0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg><span style="font-size:11px;font-weight:600;color:#1a1a1a">Back</span><div style="flex:1;height:3px;background:#e5e5e5;border-radius:2px;margin-left:4px"><div style="width:60%;height:100%;background:#1a1a1a;border-radius:2px"></div></div></div><div style="flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:7px"><div style="font-size:18px">&#x1F44B;</div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:88%"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">Nice to meet you! I'm Vera, your trusted skincare assistant.</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:90%"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">What are your top skincare priorities?</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:90%"><div style="font-size:10px;color:#1a1a1a;line-height:1.7">1. Improve skin texture &amp; glow<br>2. Reduce active spots &amp; breakouts<br>3. Minimize fine lines<br>4. Find the right products for me<br>5. Track my skin's progress<br>6. Just exploring!</div></div><div style="align-self:flex-end;background:#1a1a1a;border-radius:12px 12px 4px 12px;padding:8px 12px;max-width:86%"><div style="font-size:11px;color:#fff;line-height:1.4">My top priorities are 1, 3 and 4.</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:7px 12px;max-width:60%"><div style="font-size:11px;color:#1a1a1a">Got it!</div></div></div><div style="padding:8px 14px 14px;flex-shrink:0;border-top:1px solid #f0f0f0"><div style="display:flex;align-items:center;border:1px solid #e5e5e5;border-radius:22px;padding:7px 10px 7px 14px;gap:8px"><span style="flex:1;font-size:11px;color:#a0a0a0">Ask me anything</span><div style="width:28px;height:28px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></div></div></div></div>`,
comp:[{t:"nav",n:"Header/Back-Progress",d:"Back chevron + progress bar. Bar fills as questionnaire advances."},{t:"ui",n:"Chat-Bubble/Vera",d:"#f5f5f5 gray, left-aligned, radius 12px 12px 12px 4px."},{t:"ui",n:"Chat-Bubble/User",d:"#1a1a1a black, right-aligned, radius 12px 12px 4px 12px, white text. Visually distinct."},{t:"ui",n:"Chat-Bubble/Acknowledgment",d:"Short Vera bubble confirming receipt before next question."},{t:"nav",n:"Input/Chat",d:"Full-width pill, 'Ask me anything', black send button. Reused on Ask MIRAI screen."}],
ux:[{n:"01",t:"Vera = gray #f5f5f5, User = black #1a1a1a / white text. Flat corner tail reinforces message direction."},{n:"02",t:"Progress bar over numeric step count - shows momentum without anxiety about remaining questions."}],
flags:[{h:"Open question",b:"Feedback collection UX (Doc 4.2): whether to surface sub-dimension feedback prompts in Vera or post-scan is unresolved. Design decision required before beta."}]},

{n:8,lb:"Results - analysis",sec:"o",
h:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="flex:0 0 205px;position:relative;overflow:hidden"><img src="Screenshot_2026-03-23_at_2_45_01_PM.png" style="width:100%;height:100%;object-fit:cover;object-position:center 15%"/><div style="position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,#fff)"></div></div><div style="flex:1;padding:0 14px 10px;overflow-y:auto"><div style="font-size:13px;font-weight:800;color:#1a1a1a;margin-bottom:2px">Thanks for uploading your selfie!</div><div style="font-size:10px;color:#737373;margin-bottom:10px">Here's what we've noticed about your skin so far:</div><div style="display:flex;gap:0;overflow-x:auto;margin-bottom:10px;border-bottom:1px solid #f0f0f0"><div style="flex-shrink:0;padding:5px 10px;border-bottom:2px solid #1a1a1a;font-size:10px;font-weight:700;color:#1a1a1a">Pores</div><div style="flex-shrink:0;padding:5px 10px;font-size:10px;color:#737373">Redness</div><div style="flex-shrink:0;padding:5px 10px;font-size:10px;color:#737373">Wrinkles</div><div style="flex-shrink:0;padding:5px 10px;font-size:10px;color:#737373">UV damage</div><div style="flex-shrink:0;padding:5px 10px;font-size:10px;color:#737373">Tone</div></div><div style="font-size:11px;color:#2c2c2c;line-height:1.6;margin-bottom:12px">You have slightly enlarged pores around your nose and cheeks. This is totally normal and often linked to oil production. Using lightweight, pore-refining ingredients can help smooth things out over time.</div><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="font-size:9px;color:#737373;background:#f5f5f5;padding:2px 8px;border-radius:10px">Current</div><div style="flex:1;height:2px;background:#e5e5e5;border-radius:1px"><div style="width:30%;height:100%;background:#1a1a1a;border-radius:1px"></div></div><div style="font-size:9px;color:#1a1a1a;font-weight:700;border:1px solid #1a1a1a;padding:2px 8px;border-radius:10px">1 mon</div></div><button class="blk" style="height:40px;font-size:11px">Personalize My Routine</button></div></div>`,
comp:[{t:"ui",n:"Image/Annotated-Face",d:"Face photo full-bleed top ~55%. Facial landmark overlay shifts per dimension tab."},{t:"ui",n:"Nav/Dimension-Tabs",d:"Scrollable: Pores, Redness, Wrinkles, UV damage, Tone. User-facing labels only."},{t:"ui",n:"Control/Timeline-Slider",d:"Current to X mon. Projected on first scan; actual before/after on repeat scans."},{t:"ui",n:"Text/Dimension-Description",d:"2-4 lines wellness copy. No raw scores (Doc 4.1). No clinical language."},{t:"cta",n:"Button/Personalize-Routine",d:"40px black pill to Screen 9."}],
ux:[{n:"01",t:"Raw pipeline scores NOT shown (Doc 4.1). User sees: tab label, face annotation zone, wellness-framed description."},{n:"02",t:"Timeline slider handles two states: first scan (current to projected) and repeat scan (actual before/after)."}],
flags:[{h:"Language check",b:"All copy must pass Doc 5.1 prohibited language check. No condition names, 'diagnose', 'inflammation'. Use 'active spots', 'redness', 'uneven depth'."}]},

{n:9,lb:"Routine selection",sec:"o",

comp:[{t:"ui",n:"Text/Headline",d:"'Choose the routine that fits you best' - 17px / 800wt."},{t:"var",n:"Card/Routine-Option",d:"Extends Card/Effort-Option. Props: [title, matchPct, timeRange, investmentLevel, tagline, selected, recommended]."},{t:"ui",n:"Badge/Match-Percent",d:"'XX% match' placeholder. Lime on recommended. Computed dynamically from questionnaire."},{t:"ui",n:"Visual/Investment-Dots",d:"3 dot-slots filled left to right: 1 dot = Quick, 2 = Balanced, 3 = Luxury. Active dots = black, inactive = light gray. Avoids dollar-sign sticker shock while clearly signaling relative investment."},{t:"cta",n:"Button/Start-Routine",d:"Full-width black pill, 44px."}],

{n:14,lb:"Ask MIRAI",sec:"d",
h:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="display:flex;align-items:center;gap:8px;padding:4px 14px 8px;border-bottom:1px solid #f0f0f0;flex-shrink:0"><div style="width:28px;height:28px;border-radius:8px;background:#E8FF8F;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#1a1a1a;flex-shrink:0">M</div><div><div style="font-size:12px;font-weight:700;color:#1a1a1a">Ask MIRAI</div><div style="font-size:9px;color:#737373">Powered by your scan history</div></div></div><div style="flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:7px"><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:88%;align-self:flex-start"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">Your latest scan shows continued improvement in barrier integrity. The redness in your T-zone is worth monitoring.</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:94%;align-self:flex-start"><div style="font-size:9px;font-weight:700;color:#737373;margin-bottom:5px;letter-spacing:.06em">PEOPLE ALSO ASK</div><div style="display:flex;flex-direction:column;gap:5px"><div style="font-size:10px;color:#1a1a1a;padding:5px 8px;background:#fff;border-radius:7px;border:1px solid #e5e5e5">Why is my forehead still showing redness after 3 scans?</div><div style="font-size:10px;color:#1a1a1a;padding:5px 8px;background:#fff;border-radius:7px;border:1px solid #e5e5e5">Can I layer niacinamide and retinol on the same night?</div><div style="font-size:10px;color:#1a1a1a;padding:5px 8px;background:#fff;border-radius:7px;border:1px solid #e5e5e5">Is this routine safe for sensitive skin?</div></div></div><div style="background:#1a1a1a;border-radius:12px 12px 4px 12px;padding:8px 12px;max-width:88%;align-self:flex-end"><div style="font-size:11px;color:#fff;line-height:1.4">What caused my barrier score to dip last week?</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:88%;align-self:flex-start"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">Your hydration improvement is primarily driven by the ceramide serum you added. Barrier score increased 9 points in the following 10 days.</div></div><div style="text-align:center;font-size:10px;color:#b0b0b0;padding:3px 0">MIRAI gives insights - not medical advice. For clinical concerns, consult your professional.</div></div><div style="padding:8px 14px 14px;flex-shrink:0;border-top:1px solid #f0f0f0"><div style="display:flex;align-items:center;border:1px solid #e5e5e5;border-radius:22px;padding:7px 10px 7px 14px;gap:8px"><span style="flex:1;font-size:11px;color:#a0a0a0">Ask me anything</span><div style="width:28px;height:28px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></div></div></div></div>`,

let ci=null;

function rg(){
  const go=document.getElementById('go');
  const gd=document.getElementById('gd');
  SI.forEach((s,i)=>{
    const w=document.createElement('div');
    w.className='phone-wrap';
    w.onclick=()=>od(i);
    w.innerHTML=`<div class="phone"><div class="phone-notch"></div><div class="phone-screen">${s.h}</div></div><div class="screen-num">${s.n}</div><div class="screen-name">${s.lb}</div>`;
    (s.sec==='o'?go:gd).appendChild(w);
  });
}

function od(i){
  ci=i;
  const s=SI[i];
  document.getElementById('dp').innerHTML=`
    <div style="font-size:11px;font-weight:600;color:#a0a0a0;margin-bottom:10px;text-align:center;letter-spacing:.05em">${i+1} of ${SI.length}</div>
    <div style="width:260px;height:564px;background:#e8e8e8;border-radius:36px;border:2px solid #ccc;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.15)">
      <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:76px;height:10px;background:#1a1a1a;border-radius:5px;z-index:20"></div>
      <div style="position:absolute;inset:0;background:#fff;border-radius:34px;overflow:hidden">${s.h}</div>
    </div>
    <div style="font-size:12px;font-weight:700;color:#1a1a1a;margin-top:10px;text-align:center">${s.lb}</div>
    <div style="font-size:9px;color:#a0a0a0;text-align:center;margin-top:2px">390 x 844 - Plus Jakarta Sans</div>
    <div class="nav-btns">
      <button class="nb p" onclick="nd(-1)">&#8592; Prev</button>
      <button class="nb n" onclick="nd(1)">Next &#8594;</button>
    </div>`;
  ra(i);
  document.getElementById('ov').classList.add('open');
  document.getElementById('da').scrollTop=0;
}

function nd(dir){od((ci+dir+SI.length)%SI.length)}

function ra(i){
  const s=SI[i];
  const ch=s.comp.map(c=>`<div class="ar"><span class="atag ${c.t}">${c.t.toUpperCase()}</span><div><span style="font-weight:600;color:#1a1a1a">${c.n}</span> - ${c.d}</div></div>`).join('');
  const uh=s.ux.map(u=>`<div class="ux-c"><div class="ux-n">UX ${u.n}</div><div class="ux-t">${u.t}</div></div>`).join('');
  const fh=s.flags.length?`<div class="as"><div class="al">Flags and open questions</div>${s.flags.map(f=>`<div class="fl-c"><div class="fl-h">${f.h}</div><div class="fl-b">${f.b}</div></div>`).join('')}</div>`:'';
  document.getElementById('da').innerHTML=`<div class="anno-title">Screen ${s.n} - ${s.lb}</div><div class="as"><div class="al">Component inventory</div>${ch}</div><div class="as"><div class="al">UX decisions</div>${uh}</div>${fh}`;
}

function cl(){document.getElementById('ov').classList.remove('open');ci=null}
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')cl();
  if(e.key==='ArrowRight'&&ci!==null)nd(1);
  if(e.key==='ArrowLeft'&&ci!==null)nd(-1);
});
rg();
</script>
</body>
