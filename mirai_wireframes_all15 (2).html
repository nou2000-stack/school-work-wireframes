<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1A1A1A;--muted:#737373;--border:#E5E5E5;
  --surface:#F9F9F9;--surface2:#F5F5F5;
  --lime:#E8FF8F;--limeA:#C3F25A;--limeDark:#3D7A00;
  --amber:#f59e0b;--amberBg:#fef3c7;--amberTxt:#92400e;
  --red:#ef4444;--redBg:#fff5f5;
  --fw:260px;--fh:564px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#EDEDED;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-logo{font-size:16px;font-weight:800;letter-spacing:-.04em;color:#1a1a1a}
.topbar-logo span{color:#C3F25A}
.topbar-meta{font-size:11px;color:#737373}
.topbar-sub{font-size:10px;color:#a0a0a0;margin-top:1px}
.section-label{padding:20px 24px 10px;font-size:10px;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:#737373}
.screen-grid{display:flex;flex-wrap:wrap;gap:20px;padding:0 24px 32px}
.phone-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer}
.phone-wrap:hover .phone{box-shadow:0 16px 48px rgba(0,0,0,.2);transform:translateY(-2px)}
.phone{width:var(--fw);height:var(--fh);background:#e8e8e8;border-radius:36px;border:2px solid #cccccc;position:relative;overflow:hidden;box-shadow:0 6px 24px rgba(0,0,0,.1);transition:all .2s}
.phone-notch{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:76px;height:10px;background:#1a1a1a;border-radius:5px;z-index:20}
.phone-screen{position:absolute;inset:0;background:#fff;border-radius:34px;overflow:hidden}
.screen-num{font-size:11px;font-weight:800;color:#1a1a1a;text-align:center}
.screen-name{font-size:9px;font-weight:600;letter-spacing:.05em;color:#737373;text-align:center;text-transform:uppercase}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:200;align-items:center;justify-content:center;padding:20px}
.detail-overlay.open{display:flex}
.detail-panel{background:#fff;border-radius:20px;display:flex;gap:0;max-height:92vh;overflow:hidden;width:min(860px,98vw);box-shadow:0 32px 100px rgba(0,0,0,.4);position:relative}
.detail-phone-col{background:#f2f2f2;padding:24px 20px;display:flex;flex-direction:column;align-items:center;gap:10px;flex-shrink:0}
.detail-anno-col{flex:1;overflow-y:auto;padding:24px 26px;min-width:0}
.detail-anno-col::-webkit-scrollbar{width:4px}
.detail-anno-col::-webkit-scrollbar-thumb{background:#e5e5e5;border-radius:2px}
.close-btn{position:absolute;top:14px;right:14px;width:30px;height:30px;border-radius:50%;background:#f5f5f5;border:1px solid #e5e5e5;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;color:#737373;z-index:10;font-family:sans-serif}
.close-btn:hover{background:#e5e5e5}
.anno-title{font-size:17px;font-weight:800;color:#1a1a1a;letter-spacing:-.03em;margin-bottom:16px;line-height:1.2;padding-right:30px}
.as{margin-bottom:15px}
.al{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:#a0a0a0;margin-bottom:8px}
.ar{display:flex;gap:6px;align-items:flex-start;margin-bottom:5px;font-size:11px;color:#737373;line-height:1.4}
.atag{flex-shrink:0;font-size:8px;font-weight:700;padding:2px 6px;border-radius:3px;letter-spacing:.05em;margin-top:1px;border:0.5px solid;background:transparent;white-space:nowrap}
.atag.ui{color:#737373;border-color:#e5e5e5}
.atag.cta{color:#3D7A00;border-color:#C3F25A}
.atag.nav{color:#185FA5;border-color:#85B7EB}
.atag.var{color:#534AB7;border-color:#AFA9EC}
.atag.flag{color:#A32D2D;border-color:#F09595}
.ux-c{background:#f9f9f9;border-radius:8px;padding:10px 12px;margin-bottom:5px;border:1px solid #f0f0f0}
.ux-n{font-size:9px;font-weight:700;color:#3D7A00;margin-bottom:3px}
.ux-t{font-size:11px;color:#737373;line-height:1.5}
.fig-c{background:#f0f6ff;border-left:2px solid #85B7EB;border-radius:0 6px 6px 0;padding:8px 11px;margin-bottom:4px}
.fig-h{font-size:8px;font-weight:700;color:#185FA5;letter-spacing:.08em;margin-bottom:2px}
.fig-b{font-size:11px;color:#737373;line-height:1.4}
.fl-c{background:#fff5f5;border-left:2px solid #F09595;border-radius:0 6px 6px 0;padding:8px 11px;margin-bottom:4px}
.fl-h{font-size:8px;font-weight:700;color:#A32D2D;letter-spacing:.08em;margin-bottom:2px}
.fl-b{font-size:11px;color:#737373;line-height:1.4}
.wcag-c{background:#f9f9f9;border:1px solid #f0f0f0;border-radius:6px;padding:9px 11px;margin-top:14px}
.wcag-h{font-size:8px;font-weight:700;color:#a0a0a0;letter-spacing:.08em;margin-bottom:3px}
.wcag-b{font-size:10px;color:#a0a0a0;line-height:1.5}
.nav-btns{display:flex;gap:8px;margin-top:16px;width:100%}
.nav-btn{flex:1;height:38px;border-radius:8px;font-family:'Plus Jakarta Sans',sans-serif;font-size:11px;font-weight:700;cursor:pointer;border:none}
.nav-btn.prev{background:#f5f5f5;color:#1a1a1a;border:1px solid #e5e5e5}
.nav-btn.next{background:#1a1a1a;color:#fff}

/* PHONE INTERNALS */
.ph-s{position:absolute;inset:0;background:#fff;border-radius:34px;overflow:hidden;font-family:'Plus Jakarta Sans',sans-serif;display:flex;flex-direction:column}
.st{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 4px;flex-shrink:0}
.st-t{font-size:11px;font-weight:700;color:#1a1a1a}
.scroll{flex:1;overflow-y:auto;overflow-x:hidden}
.scroll::-webkit-scrollbar{display:none}
.btab{height:52px;background:#fff;border-top:1px solid #e5e5e5;display:flex;align-items:center;justify-content:space-around;padding:0 8px 4px;flex-shrink:0}
.bti{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.btl{font-size:8px;color:#737373;font-weight:500}
.btl.on{color:#1a1a1a;font-weight:700}
.sp{padding:0 14px}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:14px;padding:12px 14px}
.ca{border-left:3px solid #C3F25A}
.ch{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.ct{font-size:12px;font-weight:700;color:#1a1a1a}
.eyebrow{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:#737373;margin-bottom:5px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.bs{background:#E8FF8F;color:#1a1a1a}.bw{background:#fef3c7;color:#92400e}.bn{background:#f5f5f5;color:#737373}
.rb{width:3px;border-radius:3px;flex-shrink:0;align-self:stretch}
.ru{background:#ef4444}.rh{background:#f59e0b}.rn{background:#C3F25A}
.blk{width:100%;height:44px;background:#1a1a1a;color:#fff;border:none;border-radius:22px;font-family:'Plus Jakarta Sans',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.mpb{height:3px;background:#f0f0f0;border-radius:3px;margin-top:5px;overflow:hidden}
.mpf{height:100%;background:#C3F25A;border-radius:3px}
.lh{background:#E8FF8F;padding:0 5px;border-radius:4px}
</style>
</head>

html:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="flex:1;padding:20px 18px;display:flex;flex-direction:column;align-items:center;justify-content:space-between"><div style="display:flex;flex-direction:column;align-items:center;gap:16px;flex:1;justify-content:center"><div style="width:60px;height:60px;border:1.5px dashed #c8c8c8;border-radius:50%;display:flex;align-items:center;justify-content:center"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="1.5"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg></div><div style="text-align:center"><div style="font-size:18px;font-weight:800;color:#1a1a1a;letter-spacing:-.04em;margin-bottom:10px">Your Safety Matters</div><div style="font-size:11px;color:#737373;line-height:1.5;margin-bottom:14px;text-align:left">Before proceeding, please note the following:</div><div style="display:flex;flex-direction:column;gap:9px;text-align:left"><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">All results are estimates.</span></div><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Skincare is not a medical app. It should not be used to treat or diagnose any condition or disorder.</span></div><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Consult your physician if you have health concerns or before making changes to your medication or treatment.</span></div></div></div></div><button class="blk">I understand</button></div></div>`,

{num:5,name:"Scan prep",section:"onboarding",
html:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="flex:1;padding:16px 18px 14px;display:flex;flex-direction:column;justify-content:space-between"><div><div style="display:flex;justify-content:center;margin-bottom:16px"><div style="width:68px;height:56px;border:1.5px dashed #c8c8c8;border-radius:10px;display:flex;align-items:center;justify-content:center;position:relative"><div style="width:18px;height:18px;border:1.5px dashed #c8c8c8;border-radius:50%"></div><div style="position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:12px;height:7px;border:1.5px dashed #c8c8c8;border-radius:4px 4px 0 0"></div></div></div><div style="font-size:18px;font-weight:800;color:#1a1a1a;letter-spacing:-.04em;margin-bottom:4px">Lights, Camera, Selfie!</div><div style="font-size:11px;color:#737373;line-height:1.5;margin-bottom:14px">To tailor your skincare routine perfectly, I'll need a clear photo:</div><div style="display:flex;flex-direction:column;gap:9px"><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Remove glasses and sunglasses.</span></div><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Face the camera directly, neutral expression.</span></div><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Find good, even lighting — no harsh shadows.</span></div><div style="display:flex;gap:8px;align-items:flex-start"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2.5" style="flex-shrink:0;margin-top:1px"><polyline points="20 6 9 17 4 12"/></svg><span style="font-size:11px;color:#2c2c2c;line-height:1.4">Avoid makeup for most accurate assessment.</span></div></div></div><div><div style="font-size:10px;color:#b0b0b0;text-align:center;margin-bottom:12px;line-height:1.4">Don't worry it's private — I'll only use it to understand your skin better.</div><button class="blk">Take Selfie</button></div></div></div>`,
comp:[{tag:"ui",name:"Illustration/Camera-Dashed",desc:"Dashed camera outline. Same dashed-border language as Safety screen."},{tag:"ui",name:"List/Prep-Tips",desc:"4 checkmark rows. Maps to Doc §3.1 capture variables: angle, expression, lighting, makeup."},{tag:"ui",name:"Text/Privacy-Note",desc:"10px / #b0b0b0. Passive reassurance, 2 lines max."},{tag:"cta",name:"Button/Take-Selfie",desc:"44px black pill. Launches camera."}],
ux:[{n:"01",t:"4 tips map exactly to Doc §3.1 capture standard — directly affect pipeline accuracy for redness and tone evenness."},{n:"02",t:"Privacy note is passive, verbatim from Figma."},{n:"03",t:"Dashed illustration echoes Safety screen heart — consistent grammar for transition screens."}],
figma:[{h:"Component",b:"List/Prep-Tip-Item — same as List/Disclaimer-Item. Reuse across checklist screens."},{h:"Note",b:"Image quality gating (Doc §3.3) runs at app layer. Inline error if face not detected — not a modal."}],

{num:6,name:"Camera capture",section:"onboarding",
html:`<div class="ph-s" style="background:#f0f0f0"><div class="st" style="background:#f0f0f0"><span class="st-t">9:41</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:0 16px;background:#f0f0f0"><div style="font-size:10px;color:#737373;font-weight:600;letter-spacing:.06em">FACE THE CAMERA</div><div style="position:relative;width:160px;height:190px;border-radius:80px;border:1.5px dashed rgba(26,26,26,.4);display:flex;align-items:center;justify-content:center"><div style="width:130px;height:160px;border-radius:65px;background:rgba(255,255,255,.3)"></div></div><div style="background:rgba(26,26,26,.08);border-radius:8px;padding:5px 12px;font-size:9px;color:rgba(26,26,26,.6);text-align:center">Align face &middot; Hold still for 5 seconds</div></div><div style="padding:12px 16px 20px;display:flex;align-items:center;justify-content:center;gap:24px;background:#f0f0f0"><div style="width:36px;height:36px;border-radius:50%;border:1px solid rgba(26,26,26,.2);display:flex;align-items:center;justify-content:center"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(26,26,26,.5)" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg></div><div style="width:58px;height:58px;border-radius:50%;background:#1a1a1a;border:3px solid rgba(26,26,26,.25);display:flex;align-items:center;justify-content:center"><div style="width:44px;height:44px;border-radius:50%;background:#f0f0f0"></div></div><div style="width:36px;height:36px;border-radius:8px;border:1px solid rgba(26,26,26,.2);display:flex;align-items:center;justify-content:center"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(26,26,26,.4)" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></div></div></div>`,
comp:[{tag:"ui",name:"Camera/Viewport",desc:"PROFESSOR FEEDBACK ADDRESSED: Light gray (#f0f0f0) background replaces black. Acts as reflective fill light for face — critical for redness + tone accuracy (Doc §3.1)."},{tag:"ui",name:"Overlay/Face-Guide",desc:"Dashed oval, dark stroke on light bg. Consistent with splash circle overlay language."},{tag:"ui",name:"Text/Instruction",desc:"'FACE THE CAMERA' + 'Align face · Hold still' pill. 9–10px."},{tag:"cta",name:"Button/Shutter",desc:"58px black circle, light inner. Meets 44pt minimum."},{tag:"ui",name:"Button/Flip-Camera",desc:"36px circle, left of shutter."},{tag:"ui",name:"Button/Gallery",desc:"36px rounded square, right of shutter."}],
ux:[{n:"01",t:"PROFESSOR FEEDBACK ADDRESSED: White/light background replaces black. Reflected light floods the face — directly affects pipeline accuracy for redness and tone evenness (Doc §3.1 lighting requirement)."},{n:"02",t:"Dashed oval on light bg uses dark stroke (rgba 26,26,26,0.4). Visible without being clinical."},{n:"03",t:"Image quality gating (Doc §3.3): inline error if face not detected or too dark. Never a modal."}],
figma:[{h:"Component",b:"Button/Shutter — variant: [idle|capturing|success]. Capturing: conic spinner via Smart Animate."},{h:"Animation",b:"Post-capture: white flash 200ms → scale-from-center transition to AI Processing, 350ms spring."}],

{num:7,name:"AI processing",section:"onboarding",
html:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;gap:16px"><svg width="44" height="44" viewBox="0 0 44 44"><circle cx="22" cy="22" r="18" fill="none" stroke="#e5e5e5" stroke-width="3"/><circle cx="22" cy="22" r="18" fill="none" stroke="#1a1a1a" stroke-width="3" stroke-dasharray="75 38" stroke-linecap="round" transform="rotate(-90 22 22)"/></svg><div style="font-size:22px;font-weight:800;letter-spacing:-.04em;color:#1a1a1a">MIRAI</div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:10px 14px;max-width:200px"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">Analyzing your skin now... This won't take long.</div></div><div style="display:flex;gap:5px"><div style="width:6px;height:6px;border-radius:50%;background:#d0d0d0"></div><div style="width:6px;height:6px;border-radius:50%;background:#d0d0d0"></div><div style="width:6px;height:6px;border-radius:50%;background:#1a1a1a"></div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:10px 14px;max-width:210px"><div style="font-size:11px;color:#737373;line-height:1.5">While I work on it — did you know exercise increases blood flow, bringing oxygen and nutrients to the skin?</div></div></div></div>`,
comp:[{tag:"ui",name:"Loading/Spinner",desc:"44px SVG stroke spinner. Gray track, black arc."},{tag:"ui",name:"Text/Brand-Mark",desc:"'MIRAI' — 22px / 800wt. Only full wordmark in mid-flow."},{tag:"ui",name:"Chat-Bubble/Processing",desc:"Gray bg (#f5f5f5), radius 12px 12px 12px 4px. Appears at 800ms."},{tag:"ui",name:"Pagination/Step-Dots",desc:"3 dots. Third fills dark = pipeline step."},{tag:"ui",name:"Chat-Bubble/Skin-Fact",desc:"Second bubble, muted text. Appears at ~2.2s. Engagement during wait."}],
ux:[{n:"01",t:"Conversational loading — bubbles reframe waiting as 'MIRAI is working for me'. Mirrors Figma states 80→82."},{n:"02",t:"Skin fact is first value delivery before results. Establishes MIRAI as knowledgeable companion."},{n:"03",t:"White screen + wordmark only. Negative space signals that something important is happening."}],
figma:[{h:"Component",b:"Chat-Bubble/AI-Message — gray bg, radius 12px 12px 12px 4px. Reused on AI Processing AND Ask MIRAI."},{h:"Animation",b:"Bubble 1: fade-up at 800ms. Bubble 2: fade-up at 2200ms. Dots: loop pulse. After Delay in Figma Prototyping."}],
flags:[]},

{num:8,name:"Vera chat (rep.)",section:"onboarding",
html:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="display:flex;align-items:center;gap:8px;padding:4px 14px 8px;border-bottom:1px solid #f0f0f0;flex-shrink:0"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg><span style="font-size:11px;font-weight:600;color:#1a1a1a">Back</span><div style="flex:1;height:3px;background:#e5e5e5;border-radius:2px;margin-left:4px"><div style="width:60%;height:100%;background:#1a1a1a;border-radius:2px"></div></div></div><div style="flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:7px"><div style="font-size:18px">&#x1F44B;</div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:88%"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">Nice to meet you! I'm Vera, your trusted skincare assistant.</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:90%"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">What are your top skincare priorities? (You can choose more than 1)</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:90%"><div style="font-size:10px;color:#1a1a1a;line-height:1.7">1. Improve skin texture &amp; glow<br>2. Reduce active spots &amp; breakouts<br>3. Minimize fine lines<br>4. Find the right products for me<br>5. Track my skin's progress over time<br>6. Just exploring!</div></div><div style="align-self:flex-end;background:#1a1a1a;border-radius:12px 12px 4px 12px;padding:8px 12px;max-width:86%"><div style="font-size:11px;color:#fff;line-height:1.4">My top priorities are probably 1, 3 and 4.</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:7px 12px;max-width:60%"><div style="font-size:11px;color:#1a1a1a">Got it!</div></div></div><div style="padding:8px 14px 14px;flex-shrink:0;border-top:1px solid #f0f0f0"><div style="display:flex;align-items:center;border:1px solid #e5e5e5;border-radius:22px;padding:7px 10px 7px 14px;gap:8px"><span style="flex:1;font-size:11px;color:#a0a0a0">Ask me anything</span><div style="width:28px;height:28px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></div></div></div></div>`,
comp:[{tag:"nav",name:"Header/Back-Progress",desc:"Back chevron + progress bar. Bar fills as questionnaire advances."},{tag:"ui",name:"Chat-Bubble/Vera",desc:"PROFESSOR FEEDBACK ADDRESSED: #f5f5f5 gray, left-aligned, radius 12px 12px 12px 4px. Distinct from user."},{tag:"ui",name:"Chat-Bubble/User",desc:"#1a1a1a black, right-aligned, radius 12px 12px 4px 12px, white text."},{tag:"ui",name:"Chat-Bubble/Acknowledgment",desc:"Short Vera bubble: 'Got it!', 'Alrighty!' — confirms receipt."},{tag:"nav",name:"Input/Chat",desc:"Full-width pill, 'Ask me anything', black send button. Reused on Ask MIRAI."}],
ux:[{n:"01",t:"PROFESSOR FEEDBACK ADDRESSED: Vera = gray #f5f5f5, User = black #1a1a1a / white text. Flat corner tail reinforces direction. No white-on-white ambiguity."},{n:"02",t:"Vera introduces herself before asking. Named persona reduces questionnaire friction."},{n:"03",t:"Progress bar over numeric step count — shows momentum without anxiety about remaining questions."}],
figma:[{h:"Component",b:"Chat-Bubble/Vera — gray, flat bottom-left. Chat-Bubble/User — black, flat bottom-right. Two separate components, shared with Ask MIRAI."},{h:"Note",b:"Representative screen. Full flow ~15+ states (Balanced Profile 15–67)."}],
flags:[{h:"Open question",b:"Feedback collection UX (Doc §4.2): whether to surface sub-dimension feedback prompts in Vera or post-scan is unresolved. Design decision required before beta."}]},

{num:9,name:"Results — analysis",section:"onboarding",
html:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="flex:0 0 208px;background:#2e2a26;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center"><div style="width:85px;height:85px;border-radius:50%;border:1px solid rgba(255,255,255,.25)"></div><div style="position:absolute;bottom:0;left:0;right:0;height:60px;background:linear-gradient(transparent,#fff)"></div></div><div style="flex:1;padding:0 14px 10px;overflow-y:auto"><div style="font-size:13px;font-weight:800;color:#1a1a1a;letter-spacing:-.02em;margin-bottom:2px">Thanks for uploading your selfie!</div><div style="font-size:10px;color:#737373;margin-bottom:10px">Here's what we've noticed about your skin so far:</div><div style="display:flex;gap:0;overflow-x:auto;margin-bottom:10px;border-bottom:1px solid #f0f0f0"><div style="flex-shrink:0;padding:5px 10px;border-bottom:2px solid #1a1a1a;font-size:10px;font-weight:700;color:#1a1a1a">Pores</div><div style="flex-shrink:0;padding:5px 10px;font-size:10px;color:#737373">Redness</div><div style="flex-shrink:0;padding:5px 10px;font-size:10px;color:#737373">Wrinkles</div><div style="flex-shrink:0;padding:5px 10px;font-size:10px;color:#737373">UV damage</div><div style="flex-shrink:0;padding:5px 10px;font-size:10px;color:#737373">Tone</div></div><div style="font-size:11px;color:#2c2c2c;line-height:1.6;margin-bottom:12px">You have slightly enlarged pores around your nose and cheeks. This is totally normal and often linked to oil production. Using lightweight, pore-refining ingredients can help smooth things out over time.</div><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><div style="font-size:9px;color:#737373;background:#f5f5f5;padding:2px 8px;border-radius:10px">Current</div><div style="flex:1;height:2px;background:#e5e5e5;border-radius:1px"><div style="width:30%;height:100%;background:#1a1a1a;border-radius:1px"></div></div><div style="font-size:9px;color:#1a1a1a;font-weight:700;border:1px solid #1a1a1a;padding:2px 8px;border-radius:10px">1 mon</div></div><button class="blk" style="height:40px;font-size:11px">Personalize My Routine</button></div></div>`,
comp:[{tag:"ui",name:"Image/Annotated-Face",desc:"Face photo full-bleed, top ~55%. Facial landmark overlay shifts per dimension tab."},{tag:"ui",name:"Nav/Dimension-Tabs",desc:"Scrollable tabs: Pores · Redness · Wrinkles · UV damage · Tone. User-facing labels, not pipeline field names."},{tag:"ui",name:"Control/Timeline-Slider",desc:"Current ↔ X mon. Projected improvement on first scan; actual before/after on repeat scans."},{tag:"ui",name:"Text/Dimension-Description",desc:"2–4 lines wellness copy. No raw scores (Doc §4.1). No clinical language."},{tag:"cta",name:"Button/Personalize-Routine",desc:"40px black pill → Screen 10."}],
ux:[{n:"01",t:"Raw pipeline scores NOT shown (Doc §4.1). User sees: tab, face annotation, wellness-framed description."},{n:"02",t:"Face landmark overlay shows 'here is where we're looking' — not 'here is what's wrong'. Dots shift per tab."},{n:"03",t:"Timeline slider: two states — first scan (current → projected) and repeat scan (actual before/after)."}],
figma:[{h:"Component",b:"Nav/Dimension-Tab — active|inactive. Scrollable container. 5 tabs."},{h:"Component",b:"Overlay/Face-Landmark — 5 SVG variants. Dot positions from pipeline zone_pattern."},{h:"Animation",b:"Tab switch: landmark crossfade 250ms. Description slides up. Smart Animate per dimension."}],
flags:[{h:"Language check",b:"All copy must pass Doc §5.1 prohibited language. No condition names, 'diagnose', 'inflammation'. Use 'active spots', 'redness', 'uneven depth'."}]},

="38" cy="72" rx="12" ry="8" fill="rgba(195,242,90,.2)" stroke="rgba(195,242,90,.5)" stroke-width="1"/></svg><div style="display:flex;flex-direction:column;gap:3px;margin-top:5px"><div style="display:flex;align-items:center;gap:3px"><div style="width:5px;height:5px;border-radius:50%;background:#ef4444;flex-shrink:0"></div><span style="font-size:8px;color:#737373">Forehead</span></div><div style="display:flex;align-items:center;gap:3px"><div style="width:5px;height:5px;border-radius:50%;background:#f59e0b;flex-shrink:0"></div><span style="font-size:8px;color:#737373">T-Zone</span></div><div style="display:flex;align-items:center;gap:3px"><div style="width:5px;height:5px;border-radius:50%;background:#C4A882;flex-shrink:0"></div><span style="font-size:8px;color:#737373">Cheeks</span></div><div style="display:flex;align-items:center;gap:3px"><div style="width:5px;height:5px;border-radius:50%;background:#C3F25A;flex-shrink:0"></div><span style="font-size:8px;color:#3D7A00">Chin &#10003;</span></div></div></div><div style="flex:1;display:grid;grid-template-columns:1fr 1fr;gap:5px"><div class="card" style="padding:7px 7px"><div style="font-size:8px;font-weight:700;color:#737373;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Hydration</div><div style="font-size:13px;font-weight:800;color:#1a1a1a">74%</div><div class="mpb"><div class="mpf" style="width:74%"></div></div><div style="font-size:8px;color:#3D7A00;margin-top:2px">&#8593; +8%</div></div><div class="card" style="padding:7px 7px;border-color:#fca5a5;background:#fff5f5"><div style="font-size:8px;font-weight:700;color:#737373;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Redness</div><div style="font-size:13px;font-weight:800;color:#ef4444">High &#9888;</div><div class="mpb"><div class="mpf" style="width:80%;background:#ef4444"></div></div><div style="font-size:8px;color:#ef4444;margin-top:2px">Monitor</div></div><div class="card" style="padding:7px 7px"><div style="font-size:8px;font-weight:700;color:#737373;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Texture</div><div style="font-size:13px;font-weight:800;color:#1a1a1a">68</div><div class="mpb"><div class="mpf" style="width:68%"></div></div><div style="font-size:8px;color:#3D7A00;margin-top:2px">&#8593; +5</div></div><div class="card" style="padding:7px 7px"><div style="font-size:8px;font-weight:700;color:#737373;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px">Barrier</div><div style="font-size:13px;font-weight:800;color:#1a1a1a">81</div><div class="mpb"><div class="mpf" style="width:81%"></div></div><div style="font-size:8px;color:#3D7A00;margin-top:2px">Excellent</div></div></div></div><div style="background:#F9FFE0;border:1px solid rgba(195,242,90,.4);border-radius:10px;padding:8px 12px;margin-bottom:9px"><div style="font-size:10px;font-weight:700;color:#3D7A00">&#8593; Visible improvement in texture and tone over 3 sessions</div></div></div></div><div class="btab"><div class="bti"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><span class="btl">Home</span></div><div class="bti"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg><span class="btl on">Scan</span></div><div class="bti"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="btl">Progress</span></div><div class="bti"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg><span class="btl">Profile</span></div></div></div>`,

nter;margin:0 auto">~</div></div><div><div style="font-size:8px;font-weight:600;color:#737373;letter-spacing:.06em;margin-bottom:2px">TH</div><div style="width:22px;height:22px;border-radius:50%;background:#1a1a1a;color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto">&#10003;</div></div><div><div style="font-size:8px;font-weight:600;color:#737373;letter-spacing:.06em;margin-bottom:2px">FR</div><div style="width:22px;height:22px;border-radius:50%;border:2px solid #fca5a5;color:#ef4444;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto">&#10007;</div></div><div><div style="font-size:8px;font-weight:600;color:#737373;letter-spacing:.06em;margin-bottom:2px">SA</div><div style="width:22px;height:22px;border-radius:50%;background:#1a1a1a;color:#fff;font-size:8px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto">&#10003;</div></div><div><div style="font-size:8px;font-weight:600;color:#737373;letter-spacing:.06em;margin-bottom:2px">SU</div><div style="width:22px;height:22px;border-radius:50%;border:2px solid #1a1a1a;font-size:8px;font-weight:700;color:#1a1a1a;display:flex;align-items:center;justify-content:center;margin:0 auto">&middot;</div></div></div></div></div></div><div class="btab"><div class="bti"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/></svg><span class="btl">Home</span></div><div class="bti"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg><span class="btl">Scan</span></div><div class="bti"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#737373" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg><span class="btl">Progress</span></div><div class="bti"><svg width= {num:15,name:"Ask MIRAI",section:"dashboard",
html:`<div class="ph-s"><div class="st"><span class="st-t">9:41</span></div><div style="display:flex;align-items:center;gap:8px;padding:4px 14px 8px;border-bottom:1px solid #f0f0f0;flex-shrink:0"><div style="width:28px;height:28px;border-radius:8px;background:#E8FF8F;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#1a1a1a;flex-shrink:0">M</div><div><div style="font-size:12px;font-weight:700;color:#1a1a1a">Ask MIRAI</div><div style="font-size:9px;color:#737373">Powered by your scan history</div></div></div><div style="flex:1;overflow-y:auto;padding:10px 14px;display:flex;flex-direction:column;gap:7px"><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:88%;align-self:flex-start"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">Your latest scan shows continued improvement in barrier integrity. The redness in your T-zone is worth monitoring.</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:94%;align-self:flex-start"><div style="font-size:9px;font-weight:700;color:#737373;margin-bottom:5px;letter-spacing:.06em">PEOPLE ALSO ASK</div><div style="display:flex;flex-direction:column;gap:5px"><div style="font-size:10px;color:#1a1a1a;padding:5px 8px;background:#fff;border-radius:7px;border:1px solid #e5e5e5">Why is my forehead still showing redness after 3 scans?</div><div style="font-size:10px;color:#1a1a1a;padding:5px 8px;background:#fff;border-radius:7px;border:1px solid #e5e5e5">Can I layer niacinamide and retinol on the same night?</div><div style="font-size:10px;color:#1a1a1a;padding:5px 8px;background:#fff;border-radius:7px;border:1px solid #e5e5e5">Is this routine safe for sensitive skin?</div></div></div><div style="background:#1a1a1a;border-radius:12px 12px 4px 12px;padding:8px 12px;max-width:88%;align-self:flex-end"><div style="font-size:11px;color:#fff;line-height:1.4">What caused my barrier score to dip last week?</div></div><div style="background:#f5f5f5;border-radius:12px 12px 12px 4px;padding:9px 12px;max-width:88%;align-self:flex-start"><div style="font-size:11px;color:#1a1a1a;line-height:1.5">Your hydration improvement is primarily driven by the ceramide serum you added. Barrier score increased 9 points in the following 10 days.</div></div><div style="text-align:center;font-size:10px;color:#b0b0b0;padding:3px 0">MIRAI gives insights &mdash; not medical advice. For clinical concerns, consult your professional.</div></div><div style="padding:8px 14px 14px;flex-shrink:0;border-top:1px solid #f0f0f0"><div style="display:flex;align-items:center;border:1px solid #e5e5e5;border-radius:22px;padding:7px 10px 7px 14px;gap:8px"><span style="flex:1;font-size:11px;color:#a0a0a0">Ask me anything</span><div style="width:28px;height:28px;border-radius:50%;background:#1a1a1a;display:flex;align-items:center;justify-content:center;flex-shrink:0"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></div></div></div></div>`,
comp:[{tag:"ui",name:"Header/MIRAI-Identity",desc:"Lime 'M' monogram + 'Ask MIRAI' + 'Powered by your scan history'."},{tag:"ui",name:"Chat-Bubble/AI",desc:"PROFESSOR FEEDBACK ADDRESSED: #f5f5f5 gray, left, radius 12px 12px 12px 4px."},{tag:"ui",name:"Chat-Bubble/User",desc:"#1a1a1a black, right, radius 12px 12px 4px 12px, white text. Distinct from AI."},{tag:"ui",name:"Card/People-Also-Ask",desc:"Tappable question chips in gray bubble. Tap fills input."},{tag:"ui",name:"Text/Disclaimer-Strip",desc:"'MIRAI gives insights — not medical advice.' Centered, 10px, muted. Persistent."},{tag:"nav",name:"Input/Chat",desc:"Full-width pill. Black send button. Shared with Vera (Screen 8)."}],
ux:[{n:"01",t:"PROFESSOR FEEDBACK ADDRESSED: AI = #f5f5f5 gray, User = #1a1a1a black / white text. Flat tail corner communicates direction. No white-on-white."},{n:"02",t:"'Powered by your scan history' — key trust differentiator. Personalized, not a generic chatbot."},{n:"03",t:"Disclaimer is permanent but passive — small, centered, muted. Guardrail, not a warning."}],
figma:[{h:"Component",b:"Chat-Bubble/AI — shared with AI Processing (7) and Vera (8)."},{h:"Component",b:"Chat-Bubble/User — shared with Vera (8)."},{h:"Component",b:"Input/Chat — shared with Vera (8)."}],
flags:[{h:"Open question (Doc §6)",b:"Ask MIRAI guardrails: topics triggering 'consult a professional' vs direct answer not yet mapped. Design decision required before beta."}]}

function renderGrid(){
  const og=document.getElementById('grid-onboarding');
  const dg=document.getElementById('grid-dashboard');
  S.forEach((s,i)=>{
    const w=document.createElement('div');
    w.className='phone-wrap';
    w.onclick=()=>open(i);
    w.innerHTML=`<div class="phone"><div class="phone-notch"></div><div class="phone-screen">${s.html}</div></div><div class="screen-num">${s.num}</div><div class="screen-name">${s.name}</div>`;
    (s.section==='onboarding'?og:dg).appendChild(w);
  });
}

function open(i){
  const s=S[i];
  document.getElementById('dp').innerHTML=`
    <div style="font-size:11px;font-weight:600;color:#a0a0a0;margin-bottom:10px;text-align:center;letter-spacing:.05em">${i+1} of ${S.length}</div>
    <div style="width:260px;height:564px;background:#e8e8e8;border-radius:36px;border:2px solid #ccc;position:relative;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.15)">
      <div style="position:absolute;top:10px;left:50%;transform:translateX(-50%);width:76px;height:10px;background:#1a1a1a;border-radius:5px;z-index:20"></div>
      <div style="position:absolute;inset:0;background:#fff;border-radius:34px;overflow:hidden">${s.html}</div>
    </div>
    <div style="font-size:12px;font-weight:700;color:#1a1a1a;margin-top:10px;text-align:center">${s.name}</div>
    <div style="font-size:9px;color:#a0a0a0;text-align:center;margin-top:2px">390 &times; 844 &middot; Plus Jakarta Sans</div>
    <div class="nav-btns">
      <button class="nav-btn prev" onclick="open(${i>0?i-1:S.length-1})">&#8592; Prev</button>
      <button class="nav-btn next" onclick="open(${i<S.length-1?i+1:0})">Next &#8594;</button>
    </div>`;

  document.getElementById('da').innerHTML=`
    <div class="anno-title">Screen ${s.num} &mdash; ${s.name}</div>
    <div class="as"><div class="al">Component inventory</div>${s.comp.map(c=>`<div class="ar"><span class="atag ${c.tag}">${c.tag.toUpperCase()}</span><div><span style="font-weight:600;color:#1a1a1a">${c.name}</span> &mdash; ${c.desc}</div></div>`).join('')}</div>
    <div class="as"><div class="al">UX decisions</div>${s.ux.map(u=>`<div class="ux-c"><div class="ux-n">UX ${u.n}</div><div class="ux-t">${u.t}</div></div>`).join('')}</div>
    <div class="as"><div class="al">Figma handoff</div>${s.figma.map(f=>`<div class="fig-c"><div class="fig-h">${f.h}</div><div class="fig-b">${f.b}</div></div>`).join('')}</div>
    ${s.flags.length?`<div class="as"><div class="al">Flags &amp; open questions</div>${s.flags.map(f=>`<div class="fl-c"><div class="fl-h">${f.h}</div><div class="fl-b">${f.b}</div></div>`).join('')}</div>`:''}
    <div class="wcag-c"><div class="wcag-h">WCAG AA</div><div class="wcag-b">Black (#1A1A1A) on white: 17.7:1 contrast ratio. Lime (#C3F25A) badge with black text: 8.6:1. Muted text (#737373) on white: 4.7:1 &mdash; passes AA for body text. All interactive elements &ge; 44&times;44pt tap targets.</div></div>`;

  document.getElementById('overlay').classList.add('open');
  document.getElementById('da').scrollTop=0;
}

function closeDetail(){document.getElementById('overlay').classList.remove('open')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDetail()});
renderGrid();
</script>
